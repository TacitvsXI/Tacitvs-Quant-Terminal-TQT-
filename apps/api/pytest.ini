[pytest]
# pytest configuration for TQT backend tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 7.0

# Test paths
testpaths = tests

# CRITICAL: Add current directory to Python path
# This allows importing 'core' and 'fixtures' modules
pythonpath = . tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (API, database)
    slow: Slow running tests
    asyncio: Async tests requiring event loop
    volume_profile: Volume Profile related tests
    market_state: Market State detection tests
    api: API endpoint tests
    
# Asyncio configuration
asyncio_mode = auto

# Coverage options
[coverage:run]
source = core
omit = 
    */tests/*
    */conftest.py
    */__init__.py
    */main.py

[coverage:report]
precision = 2
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
